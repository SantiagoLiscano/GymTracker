<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rutina - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Ocultar el marcador nativo del details/summary */
        summary { list-style: none; }
        summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <!-- App Container -->
    <div class="max-w-md mx-auto h-screen flex flex-col bg-gray-50 relative shadow-2xl overflow-hidden border-x border-gray-200">
        
        <!-- Header -->
        <header class="bg-white px-5 py-4 shadow-sm z-10 flex justify-between items-center relative">
            <h1 class="text-xl font-bold text-gray-800">Mi Rutina</h1>
            <button id="btn-pool" class="text-blue-600 text-sm font-semibold hover:text-blue-800 transition-colors">
                <i class="fa-solid fa-list mt-1 mr-1"></i> Pool de Ejercicios
            </button>
        </header>

        <!-- Week Controls -->
        <div class="flex justify-center gap-3 py-4 bg-gray-100 border-b border-gray-200 shadow-inner z-0">
            <button id="btn-prev-week" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm">Semana Anterior</button>
            <button id="btn-curr-week" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm">Semana Actual</button>
        </div>

        <!-- Days List -->
        <main id="days-list" class="flex-1 overflow-y-auto p-4 space-y-3 relative">
            <!-- Los días se inyectan dinámicamente con JavaScript -->
        </main>
    </div>

    <!-- Modal: Pool de Ejercicios -->
    <div id="pool-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-40 z-50 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-dumbbell mr-2 text-blue-600"></i> Pool de Ejercicios</h2>
                <button id="close-pool" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 bg-gray-50/50">
                <!-- Formulario agregar al pool -->
                <form id="form-new-pool-ex" class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">Crear Nuevo Ejercicio</h3>
                    <input type="text" id="new-ex-name" placeholder="Nombre del ejercicio" class="w-full mb-3 p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <input type="number" id="new-ex-sets" placeholder="Series" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                        <input type="number" id="new-ex-reps" placeholder="Reps" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                        <input type="number" step="0.1" id="new-ex-weight" placeholder="Kg (opc)" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <button type="submit" class="w-full py-2.5 bg-gray-900 text-white rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors shadow-sm">
                        Añadir al Pool
                    </button>
                </form>

                <!-- Lista del pool -->
                <h3 class="text-sm font-bold text-gray-700 mb-3">Tus Ejercicios Guardados</h3>
                <ul id="pool-list" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <!-- Modal: Seleccionar Ejercicio para el Día -->
    <div id="add-day-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-40 z-50 flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm max-h-[80vh] flex flex-col overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <h2 class="text-lg font-bold text-gray-800">Seleccionar Ejercicio</h2>
                <button id="close-add-day" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 bg-gray-50/50">
                <ul id="add-day-list" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- ESTADO DE LA APLICACIÓN ---
            let pool = JSON.parse(localStorage.getItem('workout_pool')) || [];
            let routine = JSON.parse(localStorage.getItem('workout_routine')) || {};
            let weekOffset = 0; // 0 = Actual, -1 = Anterior
            let selectedDateForAdd = null;

            // Datos de prueba si el pool está vacío al iniciar por primera vez
            if (pool.length === 0) {
                pool = [
                    { id: 'ex1', name: 'Sentadilla Libre', sets: 4, reps: 10, weight: 80 },
                    { id: 'ex2', name: 'Press de Banca', sets: 4, reps: 8, weight: 60 },
                    { id: 'ex3', name: 'Dominadas', sets: 3, reps: 10, weight: '' }
                ];
                saveData();
            }

            // --- INICIALIZACIÓN ---
            init();

            function init() {
                renderWeekNavigation();
                renderDays();

                // Listeners de los controles de semana
                document.getElementById('btn-prev-week').addEventListener('click', () => { 
                    weekOffset = -1; 
                    renderWeekNavigation(); 
                    renderDays(); 
                });
                document.getElementById('btn-curr-week').addEventListener('click', () => { 
                    weekOffset = 0; 
                    renderWeekNavigation(); 
                    renderDays(); 
                });

                // Listeners para los Modales
                document.getElementById('btn-pool').addEventListener('click', () => {
                    renderPoolList();
                    document.getElementById('pool-modal').classList.remove('hidden');
                });
                document.getElementById('close-pool').addEventListener('click', () => {
                    document.getElementById('pool-modal').classList.add('hidden');
                });
                document.getElementById('close-add-day').addEventListener('click', () => {
                    document.getElementById('add-day-modal').classList.add('hidden');
                });

                // Formulario de agregar nuevo ejercicio al pool
                document.getElementById('form-new-pool-ex').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('new-ex-name').value;
                    const sets = document.getElementById('new-ex-sets').value;
                    const reps = document.getElementById('new-ex-reps').value;
                    const weight = document.getElementById('new-ex-weight').value;

                    const newEx = {
                        id: Date.now().toString(),
                        name, sets, reps, weight
                    };
                    pool.push(newEx);
                    saveData();
                    renderPoolList();
                    e.target.reset();
                });
            }

            // --- LÓGICA DE DATOS Y FECHAS ---
            function saveData() {
                localStorage.setItem('workout_pool', JSON.stringify(pool));
                localStorage.setItem('workout_routine', JSON.stringify(routine));
            }

            function getWeekDates(offset) {
                const curr = new Date();
                const day = curr.getDay() || 7; // Convertir Dom(0) a 7
                // Lunes de la semana seleccionada
                const monday = new Date(curr.getFullYear(), curr.getMonth(), curr.getDate() - day + 1 + (offset * 7));

                return Array.from({length: 7}).map((_, i) => {
                    const d = new Date(monday);
                    d.setDate(d.getDate() + i);
                    return d;
                });
            }

            function formatDate(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            function formatDisplayDate(date) {
                const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
                return {
                    weekday: days[date.getDay()],
                    shortDate: `${date.getDate()} ${months[date.getMonth()]}`
                };
            }

            // --- RENDERIZADO ---
            function renderWeekNavigation() {
                const prevBtn = document.getElementById('btn-prev-week');
                const currBtn = document.getElementById('btn-curr-week');

                const activeClasses = "bg-blue-600 text-white border-transparent";
                const inactiveClasses = "bg-white border-gray-300 text-gray-600 hover:bg-gray-50 border";

                if (weekOffset === 0) {
                    currBtn.className = `px-4 py-1.5 rounded-full text-sm font-semibold transition-all shadow-sm ${activeClasses}`;
                    prevBtn.className = `px-4 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm ${inactiveClasses}`;
                } else {
                    prevBtn.className = `px-4 py-1.5 rounded-full text-sm font-semibold transition-all shadow-sm ${activeClasses}`;
                    currBtn.className = `px-4 py-1.5 rounded-full text-sm font-medium transition-all shadow-sm ${inactiveClasses}`;
                }
            }

            function renderDays() {
                const container = document.getElementById('days-list');
                container.innerHTML = '';
                const dates = getWeekDates(weekOffset);
                const todayStr = formatDate(new Date());

                dates.forEach((date) => {
                    const dateStr = formatDate(date);
                    const { weekday, shortDate } = formatDisplayDate(date);
                    const dayExercises = routine[dateStr] || [];
                    const isToday = (dateStr === todayStr);

                    // Contenedor principal del día
                    const details = document.createElement('details');
                    details.className = "day-accordion bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden group";
                    // Atributo name crea un acordeón exclusivo (sólo uno abierto a la vez) en navegadores modernos
                    details.setAttribute('name', 'routine-days-accordion'); 
                    
                    if (weekOffset === 0 && isToday) {
                        details.open = true; // Abre hoy por defecto si estamos en la semana actual
                    }

                    // Título / Resumen del acordeón
                    const summary = document.createElement('summary');
                    summary.className = "p-4 cursor-pointer flex justify-between items-center hover:bg-gray-50 transition-colors select-none";
                    summary.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl ${isToday ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600'} flex flex-col justify-center items-center shadow-sm">
                                <span class="text-sm font-bold leading-none">${date.getDate()}</span>
                            </div>
                            <div>
                                <h3 class="text-gray-800 font-bold capitalize text-base">${weekday} ${isToday ? '<span class="text-blue-500 text-xs ml-1">• Hoy</span>' : ''}</h3>
                                <p class="text-xs text-gray-500 font-medium">${shortDate}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold px-2.5 py-1 ${dayExercises.length > 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} rounded-lg">${dayExercises.length} ej.</span>
                            <div class="w-6 h-6 flex items-center justify-center text-gray-400 group-open:rotate-180 transition-transform duration-300">
                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    `;

                    // Contenido Expandido (Lista de ejercicios del día)
                    const content = document.createElement('div');
                    content.className = "p-4 border-t border-gray-100 bg-gray-50/50";

                    if (dayExercises.length === 0) {
                        content.innerHTML = `<p class="text-sm text-gray-400 text-center py-5 font-medium">Descanso o sin ejercicios planificados.</p>`;
                    } else {
                        const list = document.createElement('ul');
                        list.className = "space-y-2 mb-4";
                        dayExercises.forEach(ex => {
                            const li = document.createElement('li');
                            li.className = "flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm";
                            li.innerHTML = `
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                    <div>
                                        <p class="text-sm font-bold text-gray-800">${ex.name}</p>
                                        <p class="text-xs text-gray-500 font-medium mt-0.5">${ex.sets} series x ${ex.reps} reps ${ex.weight ? `<span class="ml-1 text-gray-400">|</span> <span class="text-gray-600 font-semibold ml-1">${ex.weight} kg</span>` : ''}</p>
                                    </div>
                                </div>
                                <button onclick="deleteExerciseFromDay('${dateStr}', '${ex.instanceId}')" class="text-gray-300 hover:text-red-500 p-2 transition-colors rounded-full hover:bg-red-50">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            `;
                            list.appendChild(li);
                        });
                        content.appendChild(list);
                    }

                    // Botón añadir ejercicio
                    const addBtn = document.createElement('button');
                    addBtn.className = "w-full py-2.5 border-2 border-dashed border-gray-300 rounded-xl text-sm font-bold text-gray-500 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition-all flex items-center justify-center gap-2";
                    addBtn.innerHTML = `<i class="fa-solid fa-plus"></i> Añadir Ejercicio`;
                    addBtn.onclick = () => openAddModal(dateStr);
                    content.appendChild(addBtn);

                    details.appendChild(summary);
                    details.appendChild(content);
                    container.appendChild(details);
                });

                // Fallback JS para navegadores que no soportan el atributo 'name' en <details>
                const detailsEls = container.querySelectorAll('details.day-accordion');
                detailsEls.forEach(detail => {
                    detail.addEventListener('click', (e) => {
                        // Evitar que cerrar el details si se hace click en un botón interior
                        if(e.target.tagName === 'BUTTON' || e.target.closest('button')) return; 
                        
                        detailsEls.forEach(d => {
                            if (d !== detail && !detail.hasAttribute('open')) {
                                d.removeAttribute('open');
                            }
                        });
                    });
                });
            }

            function renderPoolList() {
                const list = document.getElementById('pool-list');
                list.innerHTML = '';
                
                if(pool.length === 0) {
                    list.innerHTML = `<p class="text-sm text-gray-400 font-medium text-center py-6">Tu pool está vacío. Crea tu primer ejercicio arriba.</p>`;
                    return;
                }

                pool.forEach(ex => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-white p-3.5 rounded-xl border border-gray-100 shadow-sm";
                    li.innerHTML = `
                        <div>
                            <p class="text-sm font-bold text-gray-800">${ex.name}</p>
                            <p class="text-xs text-gray-500 font-medium mt-0.5">${ex.sets}x${ex.reps} ${ex.weight ? `<span class="mx-1">•</span>${ex.weight}kg` : ''}</p>
                        </div>
                        <button onclick="deleteExerciseFromPool('${ex.id}')" class="text-gray-300 hover:text-red-500 p-2 transition-colors rounded-full hover:bg-red-50">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    `;
                    list.appendChild(li);
                });
            }

            // --- ACCIONES ---
            // Expuestas al scope global para que los onclick de HTML funcionen
            window.deleteExerciseFromDay = function(dateStr, instanceId) {
                if (!routine[dateStr]) return;
                routine[dateStr] = routine[dateStr].filter(ex => ex.instanceId !== instanceId);
                saveData();
                renderDays();
            };

            window.deleteExerciseFromPool = function(poolId) {
                if(!confirm("¿Estás seguro de que deseas borrar este ejercicio del pool general?")) return;
                pool = pool.filter(ex => ex.id !== poolId);
                saveData();
                renderPoolList();
            };

            window.openAddModal = function(dateStr) {
                selectedDateForAdd = dateStr;
                const list = document.getElementById('add-day-list');
                list.innerHTML = '';
                
                if(pool.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-8">
                            <i class="fa-solid fa-box-open text-gray-300 text-3xl mb-3"></i>
                            <p class="text-sm text-gray-500 font-medium mb-4">No tienes ejercicios en tu pool.</p>
                            <button onclick="window.closeAddModalAndOpenPool()" class="text-sm font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors px-4 py-2.5 rounded-lg">Ir al Pool de Ejercicios</button>
                        </div>
                    `;
                } else {
                    pool.forEach(ex => {
                        const li = document.createElement('li');
                        li.className = "flex justify-between items-center bg-white p-3.5 rounded-xl border border-gray-100 shadow-sm cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition-all group";
                        li.onclick = () => addExerciseToDay(ex);
                        li.innerHTML = `
                            <div>
                                <p class="text-sm font-bold text-gray-800 group-hover:text-blue-700">${ex.name}</p>
                                <p class="text-xs text-gray-500 font-medium mt-0.5">${ex.sets}x${ex.reps} ${ex.weight ? `<span class="mx-1">•</span>${ex.weight}kg` : ''}</p>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-blue-600 transition-colors">
                                <i class="fa-solid fa-plus text-gray-400 group-hover:text-white text-sm"></i>
                            </div>
                        `;
                        list.appendChild(li);
                    });
                }
                document.getElementById('add-day-modal').classList.remove('hidden');
            };

            window.closeAddModalAndOpenPool = function() {
                document.getElementById('add-day-modal').classList.add('hidden');
                renderPoolList();
                document.getElementById('pool-modal').classList.remove('hidden');
            };

            window.addExerciseToDay = function(poolEx) {
                if(!routine[selectedDateForAdd]) {
                    routine[selectedDateForAdd] = [];
                }
                routine[selectedDateForAdd].push({
                    ...poolEx,
                    instanceId: Date.now().toString() + Math.random().toString(36).substr(2, 5) // ID único para cada vez que se agrega
                });
                saveData();
                renderDays();
                document.getElementById('add-day-modal').classList.add('hidden');
            };
        });
    </script>
</body>
</html>
